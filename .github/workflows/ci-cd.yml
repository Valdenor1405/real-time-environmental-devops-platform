name: CI/CD DevOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check app tests dashboard
      - name: Test
        run: pytest -q
      - name: Build Docker image
        run: docker build -t environmental-platform:ci .
